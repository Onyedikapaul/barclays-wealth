<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Check Deposits</title>
    <link rel="stylesheet" href="/admin/owner/dashboard/css/layout.css" />
    <link rel="icon" href="/assets/images/logo.png" />
    <link
      rel="stylesheet"
      href="/admin/owner/dashboard/css/ckeck-deposit.css"
    />
  </head>

  <body>
    <!-- Topnav -->
    <header id="topnav-mount"></header>

    <div class="admin-shell">
      <!-- Sidebar -->
      <aside id="sidebar-mount" class="admin-sidebar"></aside>

      <!-- Main -->
      <main class="admin-main">
        <div class="admin-container">
          <div class="page-head">
            <div>
              <h1>Check Deposits</h1>
              <p class="muted">Review all submitted check deposits.</p>
            </div>

            <div class="page-actions">
              <input
                id="searchInput"
                class="input"
                type="search"
                placeholder="Search name, email, ref, acct..."
                autocomplete="off"
              />
              <select id="statusFilter" class="select">
                <option value="">All status</option>
                <option value="pending">Pending</option>
                <option value="approved">Approved</option>
                <option value="rejected">Rejected</option>
              </select>
              <button id="refreshBtn" class="btn">Refresh</button>
            </div>
          </div>

          <div class="stats-row">
            <div class="stat">
              <div class="stat-label">Total</div>
              <div id="statTotal" class="stat-value">0</div>
            </div>
            <div class="stat">
              <div class="stat-label">Pending</div>
              <div id="statPending" class="stat-value">0</div>
            </div>
            <div class="stat">
              <div class="stat-label">Approved</div>
              <div id="statApproved" class="stat-value">0</div>
            </div>
            <div class="stat">
              <div class="stat-label">Rejected</div>
              <div id="statRejected" class="stat-value">0</div>
            </div>
          </div>

          <div id="alertBox" class="alert" style="display: none"></div>

          <div class="card">
            <div class="card-head">
              <div class="muted" id="tableMeta">Loading...</div>
            </div>

            <div class="table-wrap">
              <table class="table">
                <thead>
                  <tr>
                    <th>User</th>
                    <!-- <th>Account</th> -->
                    <th>Amount</th>
                    <th>Status</th>
                    <!-- <th>Reference</th> -->
                    <th>Date</th>
                    <th>Images</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="rowsMount">
                  <tr>
                    <td colspan="8" class="muted">Loading...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

          <!-- Simple image viewer -->
          <div id="imgModal" class="modal" style="display: none">
            <div class="modal-backdrop" data-close="1"></div>

            <div class="modal-card modal-lg">
              <div class="modal-head">
                <div>
                  <div id="imgTitle" class="modal-title">Check Images</div>
                  <div class="modal-subtitle">Front & back preview</div>
                </div>

                <div class="modal-actions">
                  <a id="frontLink" class="btn btn-ghost" target="_blank"
                    >Open Front</a
                  >
                  <a id="backLink" class="btn btn-ghost" target="_blank"
                    >Open Back</a
                  >
                  <button class="btn btn-danger" data-close="1">Close</button>
                </div>
              </div>

              <div class="modal-body">
                <div class="img-grid">
                  <div class="img-card">
                    <div class="img-label">Front Check</div>
                    <img id="frontImg" alt="Front check image" />
                  </div>

                  <div class="img-card">
                    <div class="img-label">Back Check</div>
                    <img id="backImg" alt="Back check image" />
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Confirm modal -->
          <div id="confirmModal" class="modal" style="display: none">
            <div class="modal-backdrop" data-confirm-close="1"></div>
            <div class="modal-card" style="width: min(520px, 92vw)">
              <div class="modal-head">
                <div id="confirmTitle" class="modal-title">Confirm</div>
                <button class="btn btn-ghost" data-confirm-close="1" style="color: white;">
                  Close
                </button>
              </div>
              <div class="modal-body">
                <div id="confirmText" class="muted" style="margin-bottom: 12px">
                  Are you sure?
                </div>
                <div
                  style="
                    display: flex;
                    gap: 10px;
                    justify-content: flex-end;
                    flex-wrap: wrap;
                  "
                >
                  <button
                    id="confirmCancel"
                    class="btn btn-ghost"
                    data-confirm-close="1"
                    style="background-color: red; color: white;"
                  >
                    Cancel
                  </button>
                  <button id="confirmOk" class="btn">Continue</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Footer -->
    <footer id="footer-mount"></footer>

    <script src="/admin-script/admin-auth-required.js"></script>
    <script src="/admin-script/admin-logout.js"></script>
    <script src="/admin-script/admin-layout.js"></script>

    <script src="/admin-script/check-deposite.js"></script>
  </body>
</html>
