<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transfer</title>
    <link rel="stylesheet" href="/admin/owner/dashboard/css/layout.css" />
    <link rel="icon" href="/assets/images/logo.png" />

    <style>
      /* ----- Transfer form styling ----- */
      .transfer-card {
        max-width: 900px;
        padding: 18px;
        border-radius: 14px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        background: #f9f9fb;
      }

      .transfer-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .field.full {
        grid-column: 1 / -1;
      }

      .field label {
        font-size: 12px;
        font-weight: 600;
        color: rgba(0, 0, 0, 0.65);
      }

      .control {
        width: 100%;
        height: 44px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(0, 0, 0, 0.12);
        outline: none;
        background: #fff;
        font-size: 14px;
        transition:
          border-color 0.15s ease,
          box-shadow 0.15s ease;
      }

      .control::placeholder {
        color: rgba(0, 0, 0, 0.35);
      }

      .control:focus {
        border-color: rgba(3, 61, 117, 0.5);
        box-shadow: 0 0 0 4px rgba(3, 61, 117, 0.12);
      }

      /* nicer select arrow spacing */
      select.control {
        padding-right: 36px;
        cursor: pointer;
      }

      .section-title {
        margin: 10px 0 4px;
        padding: 12px;
        border-radius: 12px;
        background: rgba(3, 61, 117, 0.06);
        border: 1px solid rgba(3, 61, 117, 0.12);
        color: #033d75;
        font-weight: 700;
        font-size: 13px;
      }

      .actions {
        grid-column: 1 / -1;
        display: flex;
        gap: 10px;
        margin-top: 8px;
      }

      .btn {
        height: 44px;
        padding: 0 16px;
        border-radius: 12px;
        border: 1px solid rgba(0, 0, 0, 0.12);
        cursor: pointer;
        font-weight: 700;
        font-size: 14px;
        transition:
          transform 0.05s ease,
          box-shadow 0.15s ease,
          opacity 0.15s ease;
      }

      .btn:active {
        transform: translateY(1px);
      }

      .btn-primary {
        background: #033d75;
        color: #fff;
        border-color: rgba(3, 61, 117, 0.35);
        box-shadow: 0 8px 18px rgba(3, 61, 117, 0.12);
      }

      .btn-primary:hover {
        opacity: 0.95;
      }

      .btn-ghost {
        background: #fff;
        color: #033d75;
      }

      .btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      /* responsive */
      @media (max-width: 720px) {
        .transfer-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <!-- Top-nav -->
    <header id="topnav-mount"></header>

    <div class="admin-shell">
      <!-- Sidebar -->
      <aside id="sidebar-mount" class="admin-sidebar"></aside>

      <!-- Main -->
      <main class="admin-main">
        <div class="admin-container">
          <h1>Transfer Money</h1>

          <div class="card transfer-card">
            <div id="result" style="margin-bottom: 12px"></div>

            <form id="adminTransferForm">
              <div class="transfer-grid">
                <div class="field full">
                  <label for="userSelect">User</label>
                  <select id="userSelect" class="control" required>
                    <option value="">Loading users...</option>
                  </select>
                </div>

                <div class="field">
                  <label for="amount">Amount</label>
                  <input
                    id="amount"
                    class="control"
                    type="number"
                    step="0.01"
                    min="0"
                    placeholder="0.00"
                    required
                  />
                </div>

                <div class="field">
                  <label for="currency">Currency</label>
                  <input id="currency" class="control" value="USD" />
                </div>

                <div class="field full">
                  <label for="title">Title</label>
                  <input
                    id="title"
                    class="control"
                    placeholder="e.g. Account Funding"
                    required
                  />
                </div>

                <div class="field full">
                  <label for="narration">Narration</label>
                  <input
                    id="narration"
                    class="control"
                    placeholder="Optional note..."
                  />
                </div>

                <div class="field">
                  <label for="scope">Scope</label>
                  <select id="scope" class="control">
                    <option value="internal">internal</option>
                    <option value="local" selected>local</option>
                    <option value="wire">wire</option>
                  </select>
                </div>

                <div class="field">
                  <label for="status">Status</label>
                  <select id="status" class="control">
                    <option value="success" selected>success</option>
                    <option value="pending">pending</option>
                    <option value="failed">failed</option>
                    <option value="draft">draft</option>
                  </select>
                </div>

                <div class="field full">
                  <div class="section-title">Sender Details</div>
                </div>

                <div class="field">
                  <label for="bankName">Sender Bank Name</label>
                  <input
                    id="bankName"
                    class="control"
                    placeholder="e.g. Swift Bank"
                    required
                  />
                </div>

                <div class="field">
                  <label for="accountNumber">Sender Account Number</label>
                  <input
                    id="accountNumber"
                    class="control"
                    placeholder="e.g. 0123456789"
                    required
                  />
                </div>

                <div class="field full">
                  <label for="accountName">Sender Account Name</label>
                  <input
                    id="accountName"
                    class="control"
                    placeholder="e.g. John Doe"
                    required
                  />
                </div>

                <div class="actions">
                  <button id="submitBtn" type="submit" class="btn btn-primary">
                    Credit User
                  </button>
                  <button type="button" id="resetBtn" class="btn btn-ghost">
                    Reset
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>

    <!-- Footer -->
    <footer id="footer-mount"></footer>

    <script src="/admin-script/admin-auth-required.js"></script>

    <script src="/admin-script/admin-logout.js"></script>

    <!-- Get All Users Script-->
    <script src="/admin-script/get-all-users.js"></script>

    <!-- Admin Transfer Script -->
    <script src="/admin-script/admin-transfer.js"></script>

    <script src="/admin-script/admin-layout.js"></script>
  </body>
</html>
