<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transfer (User)</title>
    <link rel="stylesheet" href="/admin/owner/dashboard/css/layout.css" />
    <link rel="icon" href="/assets/images/logo.png" />

    <link
      rel="stylesheet"
      href="/admin/owner/dashboard/css/add-transaction.css"
    />
    <link
      rel="stylesheet"
      href="/admin/owner/dashboard/css/user-transactions.css"
    />
  </head>

  <body>
    <!-- Top-nav -->
    <header id="topnav-mount"></header>

    <div class="admin-shell">
      <!-- Main -->
      <main class="admin-main">
        <div
          class="admin-container"
          style="margin-bottom: 20px; margin-top: 20px"
        >
          <div class="page-head" style="margin-top: 50px">
            <div>
              <h1 class="page-title">Add Transactions</h1>

              <!-- ✅ meta card -->
              <div class="user-meta-card">
                <div class="user-meta-left">
                  <div class="user-meta-name" id="userNameText">Loading...</div>
                  <div class="user-meta-email" id="userEmailText">—</div>
                </div>

                <div class="user-meta-right">
                  <div class="meta-pill">
                    <div class="meta-pill__k">Balance</div>
                    <div class="meta-pill__v" id="userBalText">—</div>
                  </div>

                  <div class="meta-pill">
                    <div class="meta-pill__k">User ID</div>
                    <div class="meta-pill__v mono" id="userIdText">—</div>
                  </div>
                </div>
              </div>
            </div>

            <div class="head-actions">
              <a class="btn-back" href="/admin/owner/dashboard/users.html"
                >← Back to Users</a
              >
            </div>
          </div>

          <div class="card transfer-card">
            <div id="result" style="margin-bottom: 12px"></div>

            <form id="adminTransferForm">
              <div class="transfer-grid">
                <!-- NEW: credit or debit -->
                <div class="field">
                  <label for="txType">Transaction Type</label>
                  <select id="txType" class="control" required>
                    <option value="credit" selected>credit</option>
                    <option value="debit">debit</option>
                  </select>
                </div>

                <div class="field">
                  <label for="createdAt">Transaction Date</label>
                  <input
                    id="createdAt"
                    class="control"
                    type="datetime-local"
                    required
                  />
                </div>


                <div class="field">
                  <label for="amount">Amount</label>
                  <input
                    id="amount"
                    class="control"
                    type="number"
                    step="0.01"
                    min="0"
                    placeholder="0.00"
                    required
                  />
                </div>

                <div class="field">
                  <label for="currency">Currency</label>
                  <input id="currency" class="control" value="USD" />
                </div>

                <div class="field full">
                  <label for="title">Title</label>
                  <input
                    id="title"
                    class="control"
                    placeholder="e.g. Account Funding / Fee / Adjustment"
                    required
                  />
                </div>

                <div class="field full">
                  <label for="narration">Narration</label>
                  <input
                    id="narration"
                    class="control"
                    placeholder="Optional note..."
                  />
                </div>

                <div class="field">
                  <label for="scope">Scope</label>
                  <select id="scope" class="control">
                    <option value="internal">internal</option>
                    <option value="local" selected>local</option>
                    <option value="wire">wire</option>
                  </select>
                </div>

                <div class="field">
                  <label for="status">Status</label>
                  <select id="status" class="control">
                    <option value="success" selected>success</option>
                    <option value="pending">pending</option>
                    <option value="failed">failed</option>
                    <option value="draft">draft</option>
                  </select>
                </div>

                <div class="field full">
                  <div class="section-title">Sender Details</div>
                </div>

                <div class="field">
                  <label for="bankName">Sender Bank Name</label>
                  <input
                    id="bankName"
                    class="control"
                    placeholder="e.g. Swift Bank"
                    required
                  />
                </div>

                <div class="field">
                  <label for="accountNumber">Sender Account Number</label>
                  <input
                    id="accountNumber"
                    class="control"
                    placeholder="e.g. 0123456789"
                    required
                  />
                </div>

                <div class="field full">
                  <label for="accountName">Sender Account Name</label>
                  <input
                    id="accountName"
                    class="control"
                    placeholder="e.g. John Doe"
                    required
                  />
                </div>

                <div class="actions">
                  <button id="submitBtn" type="submit" class="btn btn-primary">
                    Process
                  </button>

                  <button type="button" id="resetBtn" class="btn btn-ghost">
                    Reset
                  </button>

                  <button type="button" id="backBtn" class="btn btn-ghost">
                    Back
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>

    <!-- Footer -->
    <footer id="footer-mount"></footer>

    <script src="/admin-script/admin-auth-required.js"></script>
    <script src="/admin-script/admin-logout.js"></script>
    <script src="/admin-script/admin-layout.js"></script>

    <!-- New Script -->
    <script src="/admin-script/add-transaction.js"></script>

    <script src="/admin-script/user-transactions.js"></script>
  </body>
</html>
